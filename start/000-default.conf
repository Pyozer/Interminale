<VirtualHost *:80>
    ServerName localhost

    # IMPORTANT : DocumentRoot = /var/www (et pas /var/www/html).
    # Les classes app/class/img.class.php et app/class/fichier.class.php
    # écrivent les fichiers uploadés en dur dans define('TARGET', '/var/www'.$dir),
    # indépendamment de $_SERVER['DOCUMENT_ROOT']. Pour que les fichiers
    # uploadés soient ensuite servables par Apache (vérification via
    # $_SERVER['DOCUMENT_ROOT'].$imghref dans le code), DocumentRoot DOIT
    # pointer exactement sur /var/www, comme c'était déjà le cas avec le
    # nginx d'origine ("root /var/www;", voir le fichier "default").
    DocumentRoot /var/www

    <Directory /var/www/>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Le dossier start/ contient des identifiants de connexion à la base
    # (docker-compose.yml, id_bdd.docker.php, schema.sql) : on bloque son
    # accès HTTP direct par sécurité, même en local.
    <Directory /var/www/start/>
        Require all denied
    </Directory>

    RewriteEngine On

    # Équivalent des "rewrite ... last;" du fichier nginx "default" d'origine,
    # qui mappait des URLs "jolies" vers les scripts .php correspondants.
    #
    # NOTE CORRECTIVE : en contexte <VirtualHost> (contexte "serveur"),
    # une cible de substitution SANS slash initial (ex: "home.php") est
    # mal réinterprétée par Apache, qui génère une URI hybride invalide
    # et répond 400 "Bad Request" avant même d'atteindre PHP. Toutes les
    # cibles ci-dessous utilisent donc un chemin absolu ("/home.php").
    RewriteRule ^/?home$ /home.php [L,QSA]
    RewriteRule ^/?connexion$ /connexion.php [L,QSA]
    RewriteRule ^/?inscription$ /inscription.php [L,QSA]
    RewriteRule ^/?forget_password$ /forget_password.php [L,QSA]
    RewriteRule ^/?profil$ /profil.php [L,QSA]
    RewriteRule ^/?profil/(?!edit)([a-zA-Z0-9\-.]+)$ /profil.php?user=$1 [L,QSA]
    RewriteRule ^/?profiledit$ /profil-edit.php [L,QSA]
    RewriteRule ^/?profiledit/imgprofil$ /profil-edit.php?edit=imgprofil [L,QSA]
    RewriteRule ^/?classe$ /classe.php [L,QSA]
    RewriteRule ^/?amis$ /amis.php [L,QSA]
    RewriteRule ^/?publications$ /publications.php [L,QSA]
    RewriteRule ^/?messages$ /messages.php [L,QSA]
    RewriteRule ^/?messages/([a-zA-Z0-9\-.]+)$ /messages.php?usermsg=$1 [L,QSA]
    RewriteRule ^/?partage_fichiers$ /partage_fichiers.php [L,QSA]
    RewriteRule ^/?utilisateurs$ /utilisateurs.php [L,QSA]
    RewriteRule ^/?chat$ /chat.php [L,QSA]
    RewriteRule ^/?erreur/([0-9]+)$ /erreur.php?err=$1 [L,QSA]
    RewriteRule ^/?parametres$ /parametres.php [L,QSA]
    RewriteRule ^/?deconnexion$ /deconnexion.php [L,QSA]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

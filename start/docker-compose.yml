name: interminale

services:
  db:
    image: mysql:8.0
    # MySQL 8.0 (et non 5.7) : l'image officielle mysql:5.7 n'a jamais
    # été publiée pour linux/arm64 (Apple Silicon, puces M1/M2/M3/M4) —
    # seule mysql:8.0 dispose d'un build arm64v8. Plusieurs comportements
    # par défaut de MySQL 8.0 sont en revanche incompatibles avec le
    # pilote mysqlnd de PHP 5.6 utilisé par ce projet de 2016, d'où les
    # options de "command" ci-dessous (voir leurs commentaires).
    container_name: interminale_db
    restart: unless-stopped
    command:
      # 1) Charset/collation par défaut du serveur : utf8/utf8_general_ci
      #    au lieu de utf8mb4/utf8mb4_0900_ai_ci (nouvelle collation par
      #    défaut depuis MySQL 8.0, dont l'id — 255 — est inconnu de
      #    mysqlnd/PHP 5.6, qui lève alors "Server sent charset (255)
      #    unknown to the client" dès PDO::__construct(), avant même
      #    d'atteindre le "SET CHARACTER SET utf8" du code (trop tardif).
      #    Cohérent avec schema.sql, qui utilise utf8 ("SET NAMES utf8").
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
      # 2) Plugin d'authentification par défaut : mysql_native_password
      #    au lieu de caching_sha2_password (défaut depuis MySQL 8.0),
      #    également inconnu de mysqlnd/PHP 5.6 ("The server requested
      #    authentication method unknown to the client
      #    [caching_sha2_password]"). Cette option agit uniquement à la
      #    CRÉATION des comptes (root et MYSQL_USER), donc seulement lors
      #    de la toute première initialisation du volume de données —
      #    contrairement aux options de charset ci-dessus, qui agissent à
      #    chaque démarrage du serveur quel que soit l'état des données.
      #    Si ce volume a déjà été initialisé sans cette option (compte
      #    "interminale" créé en caching_sha2_password), un simple
      #    redémarrage NE SUFFIT PAS : voir 00-auth-fix.sql ci-dessous,
      #    ou repartez d'un volume vierge avec "docker compose down -v".
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: interminale
      MYSQL_USER: interminale
      MYSQL_PASSWORD: interminale
    ports:
      - "3306:3306"
    volumes:
      - interminale_db_data:/var/lib/mysql
      # Filet de sécurité redondant avec l'option
      # --default-authentication-plugin ci-dessus : si jamais le compte
      # "interminale" était malgré tout créé en caching_sha2_password
      # (volume déjà initialisé par une version antérieure de ce fichier,
      # ou changement de comportement d'une future image MySQL), ce
      # script le repasse explicitement en mysql_native_password.
      # Exécuté AVANT la création du schéma (ordre alphabétique :
      # "00-" < "schema"), uniquement lors de la première initialisation
      # du volume (comme tous les scripts de docker-entrypoint-initdb.d/).
      - ./00-auth-fix.sql:/docker-entrypoint-initdb.d/00-auth-fix.sql:ro
      # Montage automatique du schéma reconstruit : exécuté une seule
      # fois, uniquement si le volume de données est vide (première
      # initialisation du conteneur MySQL).
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - interminale_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interminale_web
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      # Le dossier parent (racine du code source du projet, contenant
      # index.php, app/, include/, etc.) est monté tel quel dans le
      # webroot du conteneur.
      - ..:/var/www
      # Surcharge UNIQUEMENT le fichier de connexion DB, pour pointer
      # vers le service "db" ci-dessus sans toucher au fichier source
      # original app/admin/id_bdd.php (qui contient "localhost" et les
      # identifiants de prod historiques).
      - ./id_bdd.docker.php:/var/www/app/admin/id_bdd.php:ro
      # Surcharge UNIQUEMENT le client Socket.IO, pour pointer vers le
      # service "nodejs" ci-dessous (exposé sur localhost:3000) sans
      # toucher au fichier source original app/nodejs/client.js (qui
      # pointe en dur vers le domaine de prod historique, aujourd'hui
      # hors service).
      - ./client.docker.js:/var/www/app/nodejs/client.js:ro
    networks:
      - interminale_net

  nodejs:
    # Pas de Dockerfile dédié : les dépendances (socket.io 1.3.7 et ses
    # propres sous-dépendances) sont déjà vendorisées dans
    # app/nodejs/node_modules/ (commitées dans le dépôt, comme c'était
    # l'usage courant en 2016). Aucun "npm install" n'est donc
    # nécessaire : on monte le dossier tel quel et on exécute
    # directement "node server.js" avec l'image Node officielle.
    #
    # Choix de Node 8 : cohérent avec l'époque du projet (2016) et avec
    # les sous-dépendances natives optionnelles de "ws" 0.8.0
    # (bufferutil/utf-8-validate), qui basculent de toute façon sur
    # leur implémentation JS pure si le binding natif précompilé ne
    # correspond pas à la plateforme — donc fonctionnel même sans
    # recompilation.
    image: node:8-alpine
    container_name: interminale_nodejs
    restart: unless-stopped
    working_dir: /app
    command: ["node", "server.js"]
    volumes:
      - ../app/nodejs:/app:ro
    ports:
      # Le client (client.docker.js, chargé par include/footer.php)
      # se connecte directement à ce port depuis le navigateur, en
      # cross-origin par rapport à la page servie par "web" (8080) —
      # c'était déjà le cas dans l'architecture d'origine du projet,
      # qui pointait vers un port 3000 séparé du port 80 principal.
      - "3000:3000"
    networks:
      - interminale_net

volumes:
  interminale_db_data:

networks:
  interminale_net:

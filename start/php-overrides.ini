; =====================================================================
; Surcharge php.ini pour l'environnement Docker local — Interminale
; =====================================================================
; L'image officielle "php:5.6-apache" ne charge AUCUN php.ini par
; défaut (ni php.ini-development, ni php.ini-production) : tous les
; réglages reviennent donc à leurs valeurs compilées en dur dans PHP,
; ce qui ne correspond PAS au serveur Debian/Ubuntu d'origine du projet
; (paquets "php5", dont le php.ini fourni par la distribution activait
; déjà output_buffering).
;
; Conséquence concrète observée : "Cannot modify header information -
; headers already sent" dès que header()/setcookie()/session_start()
; sont appelés après un echo (ex: header.php affiche du HTML, puis
; user.class.php::redirect() appelle header() plus loin dans le script
; — un pattern PHP procédural très courant en 2016). Avec
; output_buffering activé, PHP met en mémoire tampon la sortie HTML et
; les en-têtes peuvent encore être modifiés tant que le buffer n'a pas
; été vidé : exactement le comportement du serveur d'origine.
;
; Ce fichier ne modifie AUCUN fichier du projet lui-même : il s'agit
; uniquement d'une configuration PHP au niveau de l'image Docker.
; =====================================================================

output_buffering = 4096

; Confort de débogage en local (le code source du projet n'active/
; désactive jamais ces réglages lui-même) :
display_errors = On
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED & ~E_STRICT

; Le code uploade des fichiers jusqu'à 20 Mo (app/class/fichier.class.php)
; et 5 Mo pour les images de profil/post (app/class/img.class.php).
upload_max_filesize = 25M
post_max_size = 25M

; Timezone cohérente avec date_default_timezone_set('Europe/Paris')
; dans include/init.php (évite un warning PHP si jamais appelé avant).
date.timezone = Europe/Paris
